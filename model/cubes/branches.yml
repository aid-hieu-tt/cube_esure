cubes:
  - name: branches
    sql: >
      SELECT * FROM agency_service."Agencies" WHERE "IsBranch" = true
    data_source: default

    joins:
      - name: regions
        sql: "{CUBE}.\"ParentAgencyId\" = {regions}.\"Id\""
        relationship: many_to_one

    dimensions:
      - name: id
        sql: "{CUBE}.\"Id\""
        type: string
        primary_key: true
      - name: name
        sql: "{CUBE}.\"Name\""
        type: string
        title: "Tên Chi Nhánh"
      - name: code
        sql: "{CUBE}.\"Code\""
        type: string
      - name: regionId
        sql: "{CUBE}.\"ParentAgencyId\""
        type: string

    measures:
      - name: count
        type: count
