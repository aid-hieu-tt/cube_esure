cubes:
  - name: regions
    sql: >
      SELECT * FROM agency_service."Agencies" WHERE "ParentAgencyId" IS NOT NULL AND "IsBranch" = false
    data_source: default

    joins:
      - name: tenants
        sql: "{CUBE}.\"ParentAgencyId\" = {tenants}.\"Id\""
        relationship: many_to_one

    dimensions:
      - name: id
        sql: "{CUBE}.\"Id\""
        type: string
        primary_key: true
      - name: name
        sql: "{CUBE}.\"Name\""
        type: string
        title: "Tên Vùng"
      - name: code
        sql: "{CUBE}.\"Code\""
        type: string

    measures:
      - name: count
        type: count
