cubes:
  - name: tenants
    sql: >
      SELECT * FROM agency_service."Agencies" WHERE "ParentAgencyId" IS NULL
    data_source: default

    joins: []

    dimensions:
      - name: id
        sql: "{CUBE}.\"Id\""
        type: string
        primary_key: true
      - name: name
        sql: "{CUBE}.\"Name\""
        type: string
        title: "Tên Đối Tác/Tenant"
      - name: code
        sql: "{CUBE}.\"Code\""
        type: string
