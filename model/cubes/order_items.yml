cubes:
  - name: order_items
    sql_table: "ecommere_service.\"OrderItems\""
    data_source: default

    joins: []

    dimensions:
      - name: id
        sql: "{CUBE}.\"Id\""
        type: string
        primary_key: true

      - name: orderid
        sql: "{CUBE}.\"OrderId\""
        type: string

      - name: productName
        sql: "({CUBE}.\"ProductSnapshot\"::json->>'Name')"
        type: string

      - name: providerName
        sql: 'COALESCE( NULLIF(TRIM(SUBSTRING( REPLACE({CUBE}."ProductSnapshot"::text, CHR(92), '''') FROM ''providerName"?[[:space:]]*:[[:space:]]*"?([^"]+)'' )), ''''), NULLIF(TRIM(SUBSTRING( {CUBE}."ProductSnapshot"::json->''Attributes''->>''provider'' FROM ''name:[[:space:]]*([^,]+)'' )), '''') )'
        type: string

      - name: providerCode
        sql: 'COALESCE( NULLIF(TRIM(SUBSTRING( REPLACE({CUBE}."ProductSnapshot"::text, CHR(92), '''') FROM ''providerCode"?[[:space:]]*:[[:space:]]*"?([^"]+)'' )), ''''), NULLIF(TRIM(SUBSTRING( {CUBE}."ProductSnapshot"::json->''Attributes''->>''provider'' FROM ''code:[[:space:]]*([^,]+)'' )), '''') )'
        type: string

      - name: packageName
        sql: 'COALESCE(NULLIF(TRIM(SUBSTRING({CUBE}."ProductSnapshot"::json->''Attributes''->>''package'' FROM ''"name"[[:space:]]*:[[:space:]]*"([^"]+)"'')), ''''), {CUBE}."ProductSnapshot"::json->>''Name'')'
        type: string

      - name: durationName
        sql: 'COALESCE( NULLIF(TRIM(SUBSTRING( REPLACE({CUBE}."ProductSnapshot"::text, CHR(92), '''') FROM ''"duration"[^:]*:[[:space:]]*"['' || CHR(123) || ''][^'' || CHR(125) || '']*"name"[[:space:]]*:[[:space:]]*"([^"]+)'' )), ''''), NULLIF(TRIM(SUBSTRING( {CUBE}."ProductSnapshot"::json->''Attributes''->>''duration'' FROM ''name:[[:space:]]*([^,]+)'' )), '''') )'
        type: string

      - name: durationMonths
        sql: "({CUBE}.\"ProductSnapshot\"::json->'Attributes'->'duration'->>'months')::int"
        type: number

      - name: invoiceexporttype
        sql: "{CUBE}.\"InvoiceExportType\""
        type: string

      - name: isdeleted
        sql: "{CUBE}.\"IsDeleted\""
        type: boolean

      - name: createdat
        sql: "{CUBE}.\"CreatedAt\""
        type: time

    measures:
      - name: count
        type: count

      - name: quantity
        sql: "{CUBE}.\"Quantity\""
        type: sum

      - name: totalRevenue
        sql: "{CUBE}.\"TotalPrice\""
        type: sum
        format: currency

      - name: totalTax
        sql: "{CUBE}.\"TaxAmount\""
        type: sum

      - name: avgUnitPrice
        sql: "{CUBE}.\"UnitPrice\""
        type: avg
        format: currency

    pre_aggregations: []
